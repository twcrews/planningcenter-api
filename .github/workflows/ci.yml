on:
  pull_request:
    branches:
    - master
jobs:
  build:
    name: Run unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@v2
    - name: Build
      run: dotnet build Crews.PlanningCenter.Api --configuration Release
    - name: Test
      run: dotnet test Crews.PlanningCenter.Api.Tests --configuration Release

  integration:
    name: Run integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@v2
    - name: Build
      run: dotnet build Crews.PlanningCenter.Api.IntegrationTests --configuration Release
    - name: Test
      env:
        PlanningCenter__AppId: ${{ secrets.PLANNINGCENTER_APP_ID }}
        PlanningCenter__Secret: ${{ secrets.PLANNINGCENTER_SECRET }}
      run: dotnet test Crews.PlanningCenter.Api.IntegrationTests --configuration Release