  assemblies:
  - Crews.PlanningCenter.Api
  namespace: Crews.PlanningCenter.Api.Extensions
  summary: >-
    Adds Planning Center OIDC authentication with configuration from appsettings.json.

    Reads from the "PlanningCenter" configuration section.
  remarks: >-
    <p>Configuration is read from appsettings.json under the "PlanningCenter" section:</p>


    <pre><code class="lang-csharp">{
      "PlanningCenter": {
        "Authority": "https://api.planningcenteronline.com",
        "ClientId": "your-client-id",
        "ClientSecret": "your-client-secret",
        "Scopes": ["openid", "people"]  // Optional, defaults to ["openid", "people"]
      }
    }</code></pre>

    <p>ClientId and ClientSecret are required. If not configured, an exception will be thrown at startup.</p>

    <p>Note: You must also configure cookie authentication and set the DefaultSignInScheme in AddAuthentication().</p>
  example: []
  syntax:
    content: public static AuthenticationBuilder AddPlanningCenterAuthentication(this AuthenticationBuilder builder)
    parameters:
    - id: builder
      type: Microsoft.AspNetCore.Authentication.AuthenticationBuilder
      description: The authentication builder.
    return:
      type: Microsoft.AspNetCore.Authentication.AuthenticationBuilder
      description: The authentication builder for chaining.
    content.vb: Public Shared Function AddPlanningCenterAuthentication(builder As AuthenticationBuilder) As AuthenticationBuilder
  overload: Crews.PlanningCenter.Api.Extensions.AuthenticationBuilderExtensions.AddPlanningCenterAuthentication*
